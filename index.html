<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Typewriter Slide</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @font-face {
    font-family: 'Rekgiva';
    src: url('https://raw.githubusercontent.com/Sanketjain0205/typewriter/main/RekgivaDemo-Regular.ttf') format('truetype');
  }

  @font-face {
    font-family: 'ChiefRanced';
    src: url('https://raw.githubusercontent.com/Sanketjain0205/typewriter/main/GC%20Chief%20Ranced%20Demo.ttf') format('truetype');
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f0f8;
    font-family: 'ChiefRanced', sans-serif;
    overflow: hidden;
  }

  /* Soft gradient background blobs */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(135deg, #f5f0ff 0%, #fff5fb 40%, #eff4ff 100%);
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.55;
  }
  .blob-1 { width: 500px; height: 500px; background: #d8c8f8; top: -120px; right: -80px; }
  .blob-2 { width: 400px; height: 400px; background: #f7c8e8; bottom: -100px; left: -80px; }
  .blob-3 { width: 300px; height: 300px; background: #c8dcf8; top: 50%; left: 50%; transform: translate(-50%,-50%); }

  /* Floating background icons */
  .icons-layer {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .icon {
    position: absolute;
    opacity: 0.08;
    color: #5548c8;
    animation: float 8s ease-in-out infinite;
  }
  .icon svg { display: block; }
  .icon:nth-child(1)  { top: 12%; left: 7%;  animation-delay: 0s;   animation-duration: 9s;  }
  .icon:nth-child(2)  { top: 72%; left: 5%;  animation-delay: 1.5s; animation-duration: 7s;  }
  .icon:nth-child(3)  { top: 20%; right: 8%; animation-delay: 0.8s; animation-duration: 11s; }
  .icon:nth-child(4)  { top: 68%; right: 6%; animation-delay: 2.2s; animation-duration: 8s;  }
  .icon:nth-child(5)  { top: 45%; left: 3%;  animation-delay: 3s;   animation-duration: 10s; }
  .icon:nth-child(6)  { top: 85%; right: 12%;animation-delay: 1s;   animation-duration: 9s;  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    33%       { transform: translateY(-14px) rotate(4deg); }
    66%       { transform: translateY(8px) rotate(-3deg); }
  }

  /* Main content */
  .slide {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 40px;
    max-width: 100%;
    width: 100%;
  }

  .subtitle-top {
    font-family: 'ChiefRanced', sans-serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    color: #3a3a4a;
    letter-spacing: 0.01em;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }

  .keyword-wrap {
    min-height: clamp(80px, 12vw, 130px);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
    width: 100%;
    padding: 0 40px;
  }

  .keyword {
    font-family: 'Rekgiva', sans-serif;
    font-size: 6.9rem;
    color: #3d35b5;
    letter-spacing: -0.02em;
    line-height: 1;
    display: inline-block;
    white-space: nowrap;
    max-width: 90vw;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
    -webkit-text-stroke: 2.2px #3d35b5;
  }

  .cursor {
    display: inline-block;
    width: clamp(3px, 0.5vw, 5px);
    height: clamp(2.5rem, 6.5vw, 5rem);
    background: #7b6ee0;
    margin-left: 4px;
    vertical-align: middle;
    border-radius: 2px;
    flex-shrink: 0;
    animation: blink 1s step-end infinite, fadeUp 0.8s ease forwards 0.6s;
    opacity: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .subtitle-bottom {
    font-family: 'ChiefRanced', sans-serif;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    font-weight: 400;
    color: #555568;
    line-height: 1.65;
    max-width: 650px;
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.9s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    z-index: 20;
    mix-blend-mode: multiply;
    opacity: 0.85;
  }
</style>
</head>

<script>
  // ✏️ EDIT YOUR WORDS HERE
  const words = [
    "Neuroscience",
    "Biofeedback",
    "Electrophysiology",
    "Neurofeedback",
    "Cognitive Science",
    "Neural Coding",
    "Brain Imaging",
  ];

  const TYPE_SPEED   = 90;
  const DELETE_SPEED = 65;
  const PAUSE_AFTER  = 2000;
  const PAUSE_BEFORE = 400;

  const el = document.getElementById('keyword');
  const MAX_SIZE = 110; // maximum font size in px
  const MIN_SIZE = 20;  // minimum font size in px

  // Auto-fit keyword to always stay on one line
  function fitKeyword() {
    const wrap = el.parentElement;
    const available = wrap.clientWidth * 0.90;
    let size = MAX_SIZE;
    el.style.fontSize = size + 'px';
    while (el.scrollWidth > available && size > MIN_SIZE) {
      size -= 1;
      el.style.fontSize = size + 'px';
    }
  }

  window.addEventListener('resize', fitKeyword);

  let wordIndex = 0, charIndex = 0, deleting = false;

  function tick() {
    const current = words[wordIndex];

    if (!deleting) {
      el.textContent = current.slice(0, charIndex + 1);
      fitKeyword();
      charIndex++;
      if (charIndex === current.length) {
        deleting = true;
        setTimeout(tick, PAUSE_AFTER);
        return;
      }
      setTimeout(tick, TYPE_SPEED);
    } else {
      el.textContent = current.slice(0, charIndex - 1);
      fitKeyword();
      charIndex--;
      if (charIndex === 0) {
        deleting = false;
        wordIndex = (wordIndex + 1) % words.length;
        setTimeout(tick, PAUSE_BEFORE);
        return;
      }
      setTimeout(tick, DELETE_SPEED);
    }
  }

  // Start after entrance animation
  setTimeout(tick, 900);
</script>
